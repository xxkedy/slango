<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>WORDPLAY</title>
<meta name="theme-color" content="#0b1210" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&display=swap');
:root{
  --bg:#0b1210; --panel:#111b18; --panel2:#0e1714; --line:#1d2b27;
  --ink:#e8f2ee; --muted:#7d938c;
  --cyan:#22d3ee; --green:#4ade80; --amber:#fbbf24; --red:#f87171;
  --disp:'Big Shoulders Display',-apple-system,'Hiragino Sans',sans-serif;
  --body:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
  max-width:520px;margin:0 auto;font-size:15px;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.screen{display:none}.screen.on{display:block}
/* ---------- HOME ---------- */
.logo{font-family:var(--disp);font-weight:900;font-size:44px;letter-spacing:.5px;line-height:1;
  color:var(--ink)}
.logo b{color:var(--cyan)}
.tag{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:.4px}
.stats{display:flex;gap:10px;margin:16px 0 18px}
.stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.stat .n{font-family:var(--disp);font-weight:900;font-size:26px;color:var(--green);line-height:1.1}
.stat .l{font-size:11px;color:var(--muted);letter-spacing:.5px}
.review{width:100%;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#2a1c05,#181005);
  border:1px solid #4a3410;border-radius:14px;padding:14px;margin-bottom:20px;text-align:left}
.review .fire{font-size:26px}
.review .rt{font-weight:800;color:var(--amber);font-size:15px}
.review .rs{font-size:12px;color:#c9a24d}
.review .cnt{margin-left:auto;font-family:var(--disp);font-weight:900;font-size:30px;color:var(--amber)}
.review[disabled]{opacity:.4}
.sec{font-size:11px;color:var(--muted);letter-spacing:2px;margin:0 0 8px 2px}
.track{width:100%;display:flex;align-items:center;gap:12px;background:var(--panel);
  border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;text-align:left;
  transition:transform .08s}
.track:active{transform:scale(.985)}
.track .no{font-family:var(--disp);font-weight:900;font-size:22px;color:var(--cyan);width:34px;flex:none}
.track .tt{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.5px;line-height:1.1}
.track .ts{font-size:11.5px;color:var(--muted);margin-top:2px}
.track .st{margin-left:auto;font-size:15px;flex:none}
.track.lock{opacity:.38}
.track.clear{border-color:#1f4630}
.track.clear .no{color:var(--green)}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:18px}
/* ---------- QUIZ ---------- */
.qhead{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.qhead .back{color:var(--muted);font-size:13px;padding:6px 8px 6px 0}
.qhead .mode{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:1px}
.qhead .mode.rev{color:var(--amber)}
.dots{display:flex;gap:5px;margin-left:auto}
.dot{width:9px;height:9px;border-radius:50%;background:#22322d}
.dot.ok{background:var(--green)}.dot.ng{background:var(--red)}.dot.now{background:var(--cyan)}
.word{font-family:var(--disp);font-weight:900;font-size:52px;line-height:1;letter-spacing:.5px;
  margin:22px 0 4px;word-break:break-word}
.wq{color:var(--muted);font-size:13px;margin-bottom:16px}
.choices{display:grid;gap:9px}
.ch{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px;
  text-align:left;font-size:15px;color:var(--ink);transition:transform .08s}
.ch:active{transform:scale(.985)}
.ch.ok{background:#0d2417;border-color:var(--green);color:#c9f5d9}
.ch.ng{background:#2a1212;border-color:var(--red);color:#ffd3d3}
.ch.dim{opacity:.45}
/* signature: BAR card (歌詞ディグ風の一節) */
.bar{display:none;margin-top:16px;background:var(--panel2);border-left:4px solid var(--cyan);
  border-radius:0 13px 13px 0;padding:13px 14px}
.bar.on{display:block;animation:up .25s ease-out}
.bar .bl{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.bar .bx{font-size:16px;line-height:1.6;font-style:italic;color:#d7e6e1}
.bar .bx mark{background:none;color:var(--cyan);font-weight:800;font-style:normal}
.bar .bm{margin-top:8px;font-size:13.5px;color:var(--green);font-weight:700}
.bar .miss{margin-top:6px;font-size:11.5px;color:var(--amber)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.bar.on{animation:none}}
.next{display:none;width:100%;margin-top:14px;background:linear-gradient(180deg,var(--cyan),#0bb6d4);
  color:#02272e;font-weight:900;font-size:16px;padding:15px;border-radius:13px}
.next.on{display:block}
/* ---------- RESULT ---------- */
.rwrap{text-align:center;padding-top:34px}
.rnum{font-family:var(--disp);font-weight:900;font-size:88px;line-height:1;color:var(--cyan)}
.rnum small{font-size:30px;color:var(--muted)}
.rmsg{font-size:17px;font-weight:800;margin:12px 0 4px}
.rmsg.clear{color:var(--green)}
.rsub{color:var(--muted);font-size:13px}
.rbtns{display:grid;gap:10px;margin-top:26px}
.rb{padding:14px;border-radius:13px;font-weight:800;font-size:15px}
.rb.p{background:linear-gradient(180deg,var(--green),#2fc665);color:#03260f}
.rb.s{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<section class="screen on" id="home">
  <h1 class="logo">WORD<b>PLAY</b></h1>
  <p class="tag">HIP-HOPスラング100語 · mikan式 4択ドリル</p>
  <div class="stats">
    <div class="stat"><div class="n" id="stTotal">0</div><div class="l">通算正解</div></div>
    <div class="stat"><div class="n" id="stRate">–</div><div class="l">正答率</div></div>
    <div class="stat"><div class="n" id="stClear">0<span style="font-size:14px;color:var(--muted)">/5</span></div><div class="l">クリア</div></div>
  </div>
  <button class="review" id="reviewBtn">
    <span class="fire">&#128293;</span>
    <span><span class="rt">復習デッキ</span><br><span class="rs">ミスった語。正解したら消える</span></span>
    <span class="cnt" id="deckCnt">0</span>
  </button>
  <p class="sec">TRACKLIST — 8/10でクリア→次が解放</p>
  <div id="tracks"></div>
  <p class="foot">記録は端末に保存 · 例文は全てオリジナル</p>
</section>

<!-- ===== QUIZ ===== -->
<section class="screen" id="quiz">
  <div class="qhead">
    <button class="back" id="backBtn">&larr; やめる</button>
    <span class="mode" id="qMode"></span>
    <div class="dots" id="dots"></div>
  </div>
  <div class="word" id="qWord"></div>
  <p class="wq">この意味は？</p>
  <div class="choices" id="choices"></div>
  <div class="bar" id="bar">
    <div class="bl">&#127908; BAR — こう使う</div>
    <div class="bx" id="barEx"></div>
    <div class="bm" id="barM"></div>
    <div class="miss" id="barMiss"></div>
  </div>
  <button class="next" id="nextBtn">NEXT &rarr;</button>
</section>

<!-- ===== RESULT ===== -->
<section class="screen" id="result">
  <div class="rwrap">
    <div class="rnum"><span id="rScore">0</span><small id="rOf">/10</small></div>
    <p class="rmsg" id="rMsg"></p>
    <p class="rsub" id="rSub"></p>
    <div class="rbtns">
      <button class="rb p" id="rAgain"></button>
      <button class="rb s" id="rHome">ホームへ</button>
    </div>
  </div>
</section>

var LEVELS=[

 {no:"03",en:"STREET TALK",jp:"ストリート語"},

/* ================= STATE ================= */
var KEY='wordplay_v1';
var S={cleared:[false,false,false,false,false],deck:[],tot:{a:0,c:0}};
function load(){try{var d=JSON.parse(localStorage.getItem(KEY));if(d&&d.cleared){S=d}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}
function $(id){return document.getElementById(id)}
function show(id){['home','quiz','result'].forEach(function(s){$(s).classList.toggle('on',s===id)});window.scrollTo(0,0)}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function unlocked(lv){return lv===1||S.cleared[lv-2]}
/* ================= HOME ================= */
function renderHome(){
  $('stTotal').textContent=S.tot.c;
  $('stRate').textContent=S.tot.a?Math.round(S.tot.c/S.tot.a*100)+'%':'–';
  var cl=S.cleared.filter(Boolean).length;
  $('stClear').innerHTML=cl+'<span style="font-size:14px;color:var(--muted)">/5</span>';
  $('deckCnt').textContent=S.deck.length;
  $('reviewBtn').disabled=S.deck.length===0;
  var h='';
  LEVELS.forEach(function(L,i){
    var lv=i+1,un=unlocked(lv),cl2=S.cleared[i];
    h+='<button class="track'+(un?'':' lock')+(cl2?' clear':'')+'" data-lv="'+lv+'" '+(un?'':'disabled')+'>'
      +'<span class="no">'+L.no+'</span>'
      +'<span><span class="tt">'+L.en+'</span><br><span class="ts">'+L.jp+' · 20語</span></span>'
      +'<span class="st">'+(cl2?'✅':(un?'▶':'🔒'))+'</span></button>';
  });
  $('tracks').innerHTML=h;
  Array.prototype.forEach.call(document.querySelectorAll('.track'),function(b){
    b.addEventListener('click',function(){startLevel(parseInt(b.dataset.lv,10))});
  });
}
/* ================= QUIZ ================= */
var Q={mode:'level',lv:1,list:[],i:0,score:0};
function startLevel(lv){
  Q={mode:'level',lv:lv,list:shuffle(WORDS.filter(function(w){return w.lv===lv})).slice(0,10),i:0,score:0};
  $('qMode').textContent='TRACK '+LEVELS[lv-1].no+' · '+LEVELS[lv-1].en;
  $('qMode').className='mode';
  show('quiz');next();
}
function startReview(){
  if(!S.deck.length)return;
  var pool=WORDS.filter(function(w){return S.deck.indexOf(w.w)>=0});
  Q={mode:'review',lv:0,list:shuffle(pool.slice()).slice(0,10),i:0,score:0};
  $('qMode').textContent='🔥 REVIEW';
  $('qMode').className='mode rev';
  show('quiz');next();
}
function dots(){
  var h='';
  for(var k=0;k<Q.list.length;k++){
    var c='dot';
    if(Q.res&&k<Q.res.length)c+=Q.res[k]?' ok':' ng';
    else if(k===Q.i)c+=' now';
    h+='<span class="'+c+'"></span>';
  }
  $('dots').innerHTML=h;
}
function next(){
  if(!Q.res)Q.res=[];
  if(Q.i>=Q.list.length){finish();return}
  var w=Q.list[Q.i];
  dots();
  $('qWord').textContent=w.w;
  $('bar').classList.remove('on');
  $('nextBtn').classList.remove('on');
  var others=shuffle(WORDS.filter(function(x){return x.w!==w.w&&x.lv===w.lv}).map(function(x){return x.m}));
  if(others.length<3)others=others.concat(shuffle(WORDS.filter(function(x){return x.w!==w.w}).map(function(x){return x.m})));
  var opts=shuffle([w.m,others[0],others[1],others[2]]);
  var h='';
  opts.forEach(function(o){h+='<button class="ch">'+o+'</button>'});
  $('choices').innerHTML=h;
  Array.prototype.forEach.call(document.querySelectorAll('.ch'),function(b){
    b.addEventListener('click',function(){answer(b,w)});
  });
}
function answer(btn,w){
  var right=btn.textContent===w.m;
  Array.prototype.forEach.call(document.querySelectorAll('.ch'),function(b){
    b.disabled=true;
    if(b.textContent===w.m)b.classList.add('ok');
    else if(b===btn)b.classList.add('ng');
    else b.classList.add('dim');
  });
  Q.res.push(right);
  S.tot.a++;
  if(right){
    Q.score++;S.tot.c++;
    if(Q.mode==='review'){var ix=S.deck.indexOf(w.w);if(ix>=0)S.deck.splice(ix,1)}
  }else{
    if(S.deck.indexOf(w.w)<0)S.deck.push(w.w);
  }
  save();dots();
  /* BAR card */
  var esc=w.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('('+esc+')','i');
  $('barEx').innerHTML=w.ex.replace(re,'<mark>$1</mark>');
  $('barM').textContent=w.w+' ＝ '+w.m;
  $('barMiss').textContent=right?'':(Q.mode==='review'?'🔥 まだデッキに残る':'🔥 復習デッキに追加した');
  $('bar').classList.add('on');
  $('nextBtn').classList.add('on');
}
$('nextBtn').addEventListener('click',function(){Q.i++;next()});
$('backBtn').addEventListener('click',function(){renderHome();show('home')});
/* ================= RESULT ================= */
function finish(){
  var n=Q.list.length;
  $('rScore').textContent=Q.score;
  $('rOf').textContent='/'+n;
  if(Q.mode==='level'){
    var cleared=Q.score>=8;
    if(cleared&&!S.cleared[Q.lv-1]){S.cleared[Q.lv-1]=true;save()}
    $('rMsg').textContent=cleared?'CLEAR!':'あと少し';
    $('rMsg').className='rmsg'+(cleared?' clear':'');
    $('rSub').textContent=cleared
      ?(Q.lv<5?'TRACK '+LEVELS[Q.lv].no+'「'+LEVELS[Q.lv].en+'」が解放された':'全トラック制覇。あとは復習デッキを空にするだけ')
      :'8問正解でクリア。ミスは🔥復習デッキに入っとる';
    $('rAgain').textContent='もう一回';
    $('rAgain').onclick=function(){startLevel(Q.lv)};
  }else{
    $('rMsg').textContent=S.deck.length===0?'デッキ空！':'消し込み中';
    $('rMsg').className='rmsg'+(S.deck.length===0?' clear':'');
    $('rSub').textContent='残り '+S.deck.length+' 語';
    $('rAgain').textContent=S.deck.length?'続けて復習':'ホームへ';
    $('rAgain').onclick=function(){S.deck.length?startReview():(renderHome(),show('home'))};
  }
  show('result');
}
$('rHome').addEventListener('click',function(){renderHome();show('home')});
$('reviewBtn').addEventListener('click',startReview);
/* ================= INIT ================= */
load();renderHome();
</script>
</body>
